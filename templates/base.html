<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights Snapshot | Tableau Export Studio</title>
    <meta name="description"
        content="A premium studio for automating Tableau dashboard exports with AI-powered insights.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>

<body>
    <div class="main-wrapper">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar shadow-sm">
            <div class="sidebar-header px-4 py-4 mb-3">
                <a href="{{ url_for('index') }}" class="navbar-brand d-flex align-items-center text-decoration-none">
                    <div class="logo-box bg-primary rounded-3 p-2 me-2 shadow-sm">
                        <i data-feather="box" class="text-white" style="width: 20px; height: 20px;"></i>
                    </div>
                    <span class="fs-4 fw-bold text-dark" style="font-family: 'Outfit'; letter-spacing: -0.5px;">Insights
                        <span class="text-primary">Snapshot</span></span>
                </a>
            </div>

            <div class="sidebar-content px-3">
                <div class="sidebar-section mb-4">
                    <p class="sidebar-heading px-3 mb-2 small fw-bold text-uppercase opacity-50"
                        style="letter-spacing: 1px;">Main</p>
                    <ul class="nav flex-column gap-1">
                        <li class="nav-item">
                            <a class="nav-link rounded-3 {{ 'active' if request.endpoint == 'index' else '' }}"
                                href="{{ url_for('index') }}">
                                <i data-feather="layout"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link rounded-3 {{ 'active' if request.endpoint == 'jobs' else '' }}"
                                href="{{ url_for('jobs') }}">
                                <i data-feather="activity"></i>
                                <span>Jobs & Presets</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="sidebar-section">
                    <p class="sidebar-heading px-3 mb-2 small fw-bold text-uppercase opacity-50"
                        style="letter-spacing: 1px;">Account</p>
                    <ul class="nav flex-column gap-1">
                        <li class="nav-item">
                            <a class="nav-link rounded-3" href="{{ url_for('logout') }}">
                                <i data-feather="log-out"></i>
                                <span>Sign out</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="sidebar-footer mt-auto p-4">
                <div class="card bg-light border-0 rounded-4 overflow-hidden shadow-none">
                    <div class="card-body p-3">
                        <div class="d-flex align-items-center mb-2">
                            <div class="bg-white rounded-circle p-1 me-2 shadow-sm">
                                <i data-feather="user" style="width: 14px; height: 14px;"></i>
                            </div>
                            <span class="small fw-bold">{{ session.username if session.username else 'User' }}</span>
                        </div>
                        <div class="progress mb-0" style="height: 4px;">
                            <div class="progress-bar bg-success" style="width: 100%;"></div>
                        </div>
                        <span class="xx-small text-muted mt-1 d-block">Premium Plan Active</span>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content area -->
        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Global toast notifications (replaces browser alert() popups) -->
    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1090;"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            feather.replace();
        });

        window.showToast = function (message, type = 'error') {
            const styles = {
                error: 'text-bg-danger', success: 'text-bg-success',
                warning: 'text-bg-warning', info: 'text-bg-dark'
            };
            const container = document.getElementById('toast-container');
            if (!container) { alert(message); return; }
            const el = document.createElement('div');
            el.className = `toast align-items-center border-0 shadow ${styles[type] || styles.info}`;
            el.setAttribute('role', 'alert');
            const body = document.createElement('div');
            body.className = 'd-flex';
            const msg = document.createElement('div');
            msg.className = 'toast-body fw-medium';
            msg.textContent = message;  // textContent — never inject markup
            const close = document.createElement('button');
            close.type = 'button';
            close.className = 'btn-close me-2 m-auto' + (type === 'warning' ? '' : ' btn-close-white');
            close.setAttribute('data-bs-dismiss', 'toast');
            body.appendChild(msg);
            body.appendChild(close);
            el.appendChild(body);
            container.appendChild(el);
            const t = new bootstrap.Toast(el, { delay: type === 'error' ? 7000 : 4000 });
            t.show();
            el.addEventListener('hidden.bs.toast', () => el.remove());
        };
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
